<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
<nav class="navbar" id="navbar">
  <a href="index.html" class="nav-logo">
    <span class="logo-main">PECU</span>
    <span class="logo-sub">الوحدة الخاصة لهندسة الأنتاج</span>
  </a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">الرئيسية</a></li>
    <li><a href="products.html">المنتجات</a></li>
    <li><a href="content.html?slug=scientific-research" data-page-slug="scientific-research">البحث العلمي</a></li>
    <li><a href="content.html?slug=design-your-furniture" data-page-slug="design-your-furniture">صمم أثاثك</a></li>
    <li><a href="content.html?slug=student-training" data-page-slug="student-training">تدريب الطلاب</a></li>
    <li><a href="content.html?slug=news" data-page-slug="news">أخبارنا</a></li>
    <li><a href="quote.html">طلب عرض سعر</a></li>
    <li><a href="about.html">من نحن</a></li>
    <li><a href="contact.html">تواصل معنا</a></li>
    <li><a href="login.html" class="nav-login-icon active" title="تسجيل دخول الموقع">👤</a></li>
    <li><button type="button" class="nav-theme-toggle theme-toggle" title="تبديل الوضع">🌙</button></li>
    <li><a href="dashboard.html" class="nav-cta">لوحة التحكم</a></li>
  </ul>
  <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
</nav>

<section class="section" style="padding-top:160px; min-height:100vh; display:flex; align-items:center; justify-content:center;">
  <div style="width:100%; max-width:520px; background:var(--dark2); border:1px solid rgba(201,169,110,0.18); padding:34px;">
    <h1 style="font-family:'Playfair Display',serif; color:var(--gold); font-size:32px; margin-bottom:8px;">تسجيل دخول الموقع</h1>
    <p style="color:var(--gray); margin-bottom:24px;">أدخل بيانات مستخدم الموقع للمتابعة.</p>

    <div class="form-group">
      <label>اسم الدخول / البريد</label>
      <input type="text" id="loginUser" placeholder="example@email.com أو username">
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <input type="password" id="loginPass" placeholder="••••••••" onkeyup="if(event.key==='Enter')doSiteLogin()">
    </div>
    <div id="loginError" style="display:none; color:var(--danger); font-size:13px; margin-bottom:14px;"></div>
    <button class="btn btn-primary" onclick="doSiteLogin()" style="width:100%; justify-content:center;"><span>🔐 دخول</span></button>

    <div id="loginSuccess" style="display:none; margin-top:14px; color:var(--success); font-size:14px;"></div>
  </div>
</section>

<script src="theme.js"></script>
<script src="database.js"></script>
<script>
  PECUTheme.initTheme();
  DB.init();

  window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', scrollY > 50);
  });
  document.getElementById('hamburger').onclick = () => {
    const nl = document.getElementById('navLinks');
    nl.style.display = nl.style.display === 'flex' ? 'none' : 'flex';
  };

  function doSiteLogin() {
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value;
    const err = document.getElementById('loginError');
    const ok = document.getElementById('loginSuccess');

    if (!username || !password) {
      err.textContent = '⚠️ يرجى إدخال اسم الدخول وكلمة المرور';
      err.style.display = 'block';
      ok.style.display = 'none';
      return;
    }

    const user = DB.checkWebsiteUser(username, password);
    if (!user) {
      err.textContent = `❌ فشل تسجيل الدخول: ${DB.lastError || 'بيانات غير صحيحة أو المستخدم ليس من نوع website'}`;
      err.style.display = 'block';
      ok.style.display = 'none';
      return;
    }

    DB.websiteLogin(user);
    err.style.display = 'none';
    ok.textContent = `✅ مرحباً ${user.full_name || user.email}، جارٍ تحويلك...`;
    ok.style.display = 'block';
    setTimeout(() => { window.location.href = 'index.html'; }, 800);
  }
</script>
</body>
</html>
